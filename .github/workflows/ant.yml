name: Ant Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: Set up JDK 1.8
        uses: actions/setup-java@v1
        with:
          java-version: 1.8
      - name: Build Extension
        run: ant extensions
      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: TamodaWortise
          path: out/*.aix
