name: Ant Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Update ke v4
        with:
          submodules: recursive
      - name: Set up JDK 1.8
        uses: actions/setup-java@v4 # Update ke v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Build Extension
        run: ant extensions
      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # INI YANG WAJIB v4 BOS
        with:
          name: TamodaWortise
          path: out/*.aix
